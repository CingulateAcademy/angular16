<div class="pet-card">
  <div class="image-container">
    <img 
      [src]="pet.imageUrl" 
      [alt]="pet.name"
      class="pet-image"
      (load)="onImageLoad($event)"
      (error)="onImageError($event)">
    <div class="image-overlay"></div>
  </div>
  
  <div class="pet-info">
    <h3>{{ pet.name }}</h3>
    <p class="breed">{{ pet.breed }}</p>
    <p class="type">{{ pet.type | titlecase }}</p>
    <p class="price">${{ pet.price }}</p>
    <p class="description">{{ pet.description }}</p>
    
    <a [routerLink]="['/pet', pet.id]" class="view-btn">
      👀 View Details
    </a>
  </div>
</div>
