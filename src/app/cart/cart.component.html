<div class="cart-container">
  <h2>Your Adoption Cart 🛒 ({{ cart().length }})</h2>
  
  
    <p class="empty-cart" *ngIf = "cart().length === 0; else notFound">Your cart is empty.<br>
      <a routerLink="/">Go adopt some pets! 🐾</a>
    </p>
   <ng-template #notFound>
    <div class="cart-items">
      
        <div class="cart-item" *ngFor ="let pet of cart()">
          <img [src]="pet.imageUrl" [alt]="pet.name" class="cart-image">
          <div class="cart-details">
            <h3>{{ pet.name }} – {{ pet.breed }}</h3>
            <p class="price">${{ pet.price }}</p>
          </div>
          <button class="remove-btn" (click)="removeFromCart(pet.id)">Remove</button>
        </div>
      
    </div>

    <div class="cart-summary">
      <h3>Total: <span class="total-amount">${{ total() }}</span></h3>
      <button class="checkout-btn" (click)="checkout()">Confirm Adoption 🐶❤️</button>
    </div>
  </ng-template>

  <!-- Demo Control Buttons -->
  <div class="demo-actions">
    <button class="clear-all-btn" (click)="clearAllData()">
      🗑️ Clear All Data
    </button>
    
    <button class="reset-btn" (click)="resetToDefaultPets()">
      🔄 Reload Original Pets
    </button>
  </div>

  <a routerLink="/" class="back-shop">← Back to Shop</a>
</div>
